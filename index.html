<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>สหกรณ์การเกษตรคำชะอี จำกัด</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=Prompt:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --blue: #1565C0;
  --blue-dark: #0D47A1;
  --blue-light: #E3F2FD;
  --green: #2E7D32;
  --green-light: #E8F5E9;
  --gold: #F9A825;
  --red: #C62828;
  --red-light: #FFEBEE;
  --text: #1A1A2E;
  --text-muted: #546E7A;
  --bg: #F0F4F8;
  --white: #FFFFFF;
  --border: #CFD8DC;
  --shadow: 0 2px 16px rgba(13,71,161,0.10);
  --radius: 16px;
}
* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
body { font-family:'Sarabun',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; font-size:15px; }

/* TOPBAR */
.topbar {
  background: linear-gradient(135deg, var(--blue-dark) 0%, var(--blue) 100%);
  padding: 10px 16px;
  display: flex; align-items: center; gap: 10px;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 2px 12px rgba(13,71,161,0.3);
  min-height: 64px;
}
.topbar-avatar {
  width: 44px; height: 44px; border-radius: 50%;
  overflow: hidden; flex-shrink: 0;
  border: 2.5px solid rgba(255,255,255,0.85);
  box-shadow: 0 2px 8px rgba(0,0,0,0.25);
}
.topbar-avatar img { width:100%; height:100%; object-fit:cover; object-position:center top; }
.topbar-title { flex:1; color:white; }
.topbar-title h1 { font-family:'Prompt',sans-serif; font-size:13px; font-weight:700; line-height:1.3; }
.topbar-title p { font-size:11px; opacity:0.8; margin-top:1px; }
.topbar-logo {
  width: 44px; height: 44px; border-radius: 50%;
  overflow: hidden; flex-shrink: 0;
  border: 2.5px solid rgba(255,255,255,0.85);
  box-shadow: 0 2px 8px rgba(0,0,0,0.25);
}
.topbar-logo img { width:100%; height:100%; object-fit:cover; }

/* BOTTOM NAV */
.bottom-nav {
  position:fixed; bottom:0; left:0; right:0;
  background:var(--white); border-top:1.5px solid var(--border);
  display:flex; z-index:100;
  padding-bottom:env(safe-area-inset-bottom);
  box-shadow: 0 -2px 12px rgba(0,0,0,0.08);
}
.nav-item {
  flex:1; display:flex; flex-direction:column; align-items:center;
  justify-content:center; padding:8px 0 6px; gap:2px;
  cursor:pointer; color:var(--text-muted); border:none;
  background:none; font-family:'Sarabun',sans-serif; font-size:10px;
  transition: color 0.2s;
}
.nav-item.active { color:var(--blue); }
.nav-item.active .nav-icon { transform: scale(1.1); }
.nav-icon { font-size:22px; line-height:1; transition:transform 0.2s; }

/* MAIN */
.main { padding:14px 14px 80px; }
.page { animation: fadeUp 0.2s ease; }
@keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }

/* LOGIN */
.login-screen {
  min-height: 100vh;
  display: flex; flex-direction: column; align-items: center;
  justify-content: flex-start;
  padding: 36px 24px 32px;
  background: linear-gradient(180deg, #E3F2FD 0%, #F0F4F8 40%);
}
.login-logo {
  width: 120px; height: 120px; border-radius: 50%;
  overflow: hidden; margin-bottom: 16px;
  box-shadow: 0 8px 32px rgba(13,71,161,0.25);
  border: 4px solid var(--blue);
}
.login-logo img { width:100%; height:100%; object-fit:cover; }
.login-coop-name {
  font-family:'Prompt',sans-serif; font-size:17px;
  font-weight:700; color:var(--blue-dark);
  text-align:center; line-height:1.4; margin-bottom:4px;
}
.login-sub {
  font-size:12px; color:var(--text-muted);
  text-align:center; margin-bottom:28px; line-height:1.6;
}

/* STEP INDICATOR */
.steps {
  display:flex; gap:8px; align-items:center;
  justify-content:center; margin-bottom:24px; width:100%;
}
.step-dot {
  width:28px; height:28px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:12px; font-weight:700;
  transition: all 0.3s;
}
.step-dot.done { background:var(--green); color:white; }
.step-dot.active { background:var(--blue); color:white; box-shadow:0 2px 8px rgba(21,101,192,0.4); }
.step-dot.pending { background:var(--border); color:var(--text-muted); }
.step-line { flex:1; height:2px; background:var(--border); border-radius:2px; max-width:40px; }
.step-line.done { background:var(--green); }

/* FORM CARD */
.form-card {
  background:white; border-radius:20px;
  padding:22px 20px; width:100%;
  box-shadow:0 4px 24px rgba(13,71,161,0.10);
  border:1px solid rgba(21,101,192,0.1);
}
.form-title {
  font-family:'Prompt',sans-serif; font-size:15px;
  font-weight:700; color:var(--blue-dark);
  margin-bottom:4px;
}
.form-subtitle { font-size:12px; color:var(--text-muted); margin-bottom:18px; }
.form-label {
  font-size:12px; font-weight:700; color:var(--text);
  margin-bottom:6px; display:block; letter-spacing:0.3px;
}
.form-select, .form-input {
  width:100%; padding:13px 14px;
  border:1.5px solid var(--border); border-radius:12px;
  font-size:15px; font-family:'Sarabun',sans-serif;
  background:white; color:var(--text); outline:none;
  transition:border-color 0.2s, box-shadow 0.2s;
  appearance:none; -webkit-appearance:none;
}
.form-select:focus, .form-input:focus {
  border-color:var(--blue);
  box-shadow:0 0 0 3px rgba(21,101,192,0.12);
}
.form-group { margin-bottom:16px; position:relative; }
.select-arrow {
  position:absolute; right:14px; top:50%; transform:translateY(-50%);
  pointer-events:none; color:var(--text-muted); font-size:12px;
}
.input-hint { font-size:11px; color:var(--text-muted); margin-top:5px; }

.btn-primary {
  width:100%; padding:14px;
  background:linear-gradient(135deg, var(--blue-dark), var(--blue));
  color:white; border:none; border-radius:12px;
  font-size:16px; font-weight:700; font-family:'Prompt',sans-serif;
  cursor:pointer; margin-top:4px;
  box-shadow:0 4px 16px rgba(13,71,161,0.3);
  transition:transform 0.15s, box-shadow 0.15s;
}
.btn-primary:active { transform:scale(0.98); box-shadow:none; }
.btn-back {
  width:100%; padding:12px;
  background:transparent; color:var(--blue);
  border:1.5px solid var(--blue); border-radius:12px;
  font-size:14px; font-weight:600; font-family:'Sarabun',sans-serif;
  cursor:pointer; margin-top:10px;
}

/* ALERT */
.alert {
  padding:12px 14px; border-radius:12px;
  font-size:13px; margin-bottom:14px;
  display:flex; gap:8px; align-items:flex-start;
  line-height:1.5;
}
.alert.error { background:var(--red-light); color:var(--red); border:1px solid #FFCDD2; }
.alert.info { background:var(--blue-light); color:var(--blue-dark); border:1px solid #BBDEFB; }
.alert.success { background:var(--green-light); color:var(--green); border:1px solid #C8E6C9; }

/* CARDS */
.card {
  background:var(--white); border-radius:var(--radius);
  padding:16px; margin-bottom:12px;
  box-shadow:var(--shadow); border:1px solid var(--border);
}
.card-title {
  font-family:'Prompt',sans-serif; font-size:13px;
  font-weight:700; color:var(--blue-dark);
  display:flex; align-items:center; gap:6px;
  margin-bottom:12px;
}

/* HERO CARD */
.hero-card {
  background:linear-gradient(135deg, var(--blue-dark) 0%, var(--blue) 100%);
  border-radius:20px; padding:18px 18px 16px;
  color:white; margin-bottom:12px; position:relative; overflow:hidden;
}
.hero-card::before {
  content:''; position:absolute; top:-20px; right:-20px;
  width:100px; height:100px; border-radius:50%;
  background:rgba(255,255,255,0.06);
}
.hero-card::after {
  content:''; position:absolute; bottom:-30px; left:20px;
  width:80px; height:80px; border-radius:50%;
  background:rgba(255,255,255,0.04);
}
.hero-name { font-size:13px; opacity:0.85; }
.hero-group { font-size:11px; opacity:0.65; margin-top:1px; margin-bottom:14px; }
.hero-label { font-size:10px; opacity:0.75; text-transform:uppercase; letter-spacing:0.5px; }
.hero-amount {
  font-family:'Prompt',sans-serif; font-size:30px;
  font-weight:700; letter-spacing:-0.5px; line-height:1.1;
}
.hero-unit { font-size:13px; opacity:0.8; margin-left:3px; }
.hero-badge {
  display:inline-block; background:rgba(255,255,255,0.18);
  border-radius:20px; padding:3px 10px; font-size:10px; margin-top:8px;
}

/* DEBT ROWS */
.debt-row {
  display:flex; justify-content:space-between; align-items:center;
  padding:9px 0; border-bottom:1px solid var(--border);
}
.debt-row:first-child { padding-top:0; }
.debt-row:last-child { border-bottom:none; padding-bottom:0; }
.debt-label { font-size:13px; color:var(--text-muted); display:flex; align-items:center; gap:6px; }
.dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.debt-value { font-weight:700; font-size:13px; }
.overdue { color:var(--red); }
.normal { color:var(--text); }
.debt-total-row {
  display:flex; justify-content:space-between; align-items:center;
  padding:12px 0 0; border-top:2px solid var(--blue-light); margin-top:4px;
}

/* DOC / NEWS */
.doc-item {
  display:flex; align-items:center; gap:12px;
  padding:11px 0; border-bottom:1px solid var(--border);
  text-decoration:none; color:var(--text); cursor:pointer;
}
.doc-item:last-child { border-bottom:none; }
.doc-icon {
  width:40px; height:40px; border-radius:10px;
  display:flex; align-items:center; justify-content:center;
  font-size:20px; flex-shrink:0;
}
.news-item {
  display:flex; gap:12px; padding:11px 0;
  border-bottom:1px solid var(--border); cursor:pointer;
}
.news-item:last-child { border-bottom:none; }
.news-thumb {
  width:64px; height:52px; border-radius:10px;
  background:var(--blue-light); flex-shrink:0;
  display:flex; align-items:center; justify-content:center; font-size:26px;
}
.news-tag {
  display:inline-block; background:var(--blue-light);
  color:var(--blue-dark); font-size:9px; font-weight:700;
  padding:2px 7px; border-radius:20px; margin-bottom:3px;
}
.section-label {
  font-size:10px; font-weight:700; color:var(--text-muted);
  letter-spacing:1px; text-transform:uppercase; margin:16px 0 8px;
}

/* TAG */
.tag-overdue { display:inline-block; background:var(--red-light); color:var(--red); font-size:10px; font-weight:700; padding:2px 7px; border-radius:20px; }
.tag-ok { display:inline-block; background:var(--green-light); color:var(--green); font-size:10px; font-weight:700; padding:2px 7px; border-radius:20px; }

/* LOADING */
.loading-screen {
  min-height:100vh; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:16px;
}
.spinner {
  width:40px; height:40px; border:3px solid var(--border);
  border-top-color:var(--blue); border-radius:50%;
  animation:spin 0.8s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }
</style>

function findMember(groupCode, memberId4, password) {
  // memberId4 is 4-digit string
  const mid = parseInt(memberId4);
  if(isNaN(mid)) return null;
  const m = MEMBER_DB[String(mid)];
  if(!m) return null;
  // Check group match
  if(m.group_code !== groupCode) return null;
  // Check password
  if(m.password !== password) return null;
  return m;
}

function getMembersInGroup(groupCode) {
  return Object.values(MEMBER_DB).filter(m => m.group_code === groupCode);
}

function buildStepIndicator(step) {
  return `<div class="steps">
    <div class="step-dot ${step>1?'done':step===1?'active':'pending'}">${step>1?'✓':'1'}</div>
    <div class="step-line ${step>1?'done':''}"></div>
    <div class="step-dot ${step>2?'done':step===2?'active':'pending'}">${step>2?'✓':'2'}</div>
    <div class="step-line ${step>2?'done':''}"></div>
    <div class="step-dot ${step>3?'done':step===3?'active':'pending'}">${step>3?'✓':'3'}</div>
  </div>`;
}

function buildLoginHeader() {
  return `
    <div class="login-logo"><img src="${CONFIG.LOGO}" alt="โลโก้"></div>
    <p class="login-coop-name">สหกรณ์การเกษตรคำชะอี จำกัด</p>
    <p class="login-sub">อ.คำชะอี จ.มุกดาหาร</p>
  `;
}

// STEP 1: เลือกกลุ่ม
function buildStep1() {
  const options = GROUP_LIST.map(g =>
    `<option value="${g.code}" ${state.loginGroup===g.code?'selected':''}>${g.code} - ${g.name}</option>`
  ).join('');
  return `<div class="login-screen">
    ${buildLoginHeader()}
    ${buildStepIndicator(1)}
    <div class="form-card">
      <p class="form-title">ขั้นตอนที่ 1 — เลือกกลุ่ม</p>
      <p class="form-subtitle">เลือกกลุ่มที่ท่านเป็นสมาชิกอยู่</p>
      ${state.error ? `<div class="alert error">⚠️ ${state.error}</div>` : ''}
      <div class="form-group">
        <label class="form-label">กลุ่มสมาชิก</label>
        <select id="groupSelect" class="form-select">
          <option value="">-- กรุณาเลือกกลุ่ม --</option>
          ${options}
        </select>
        <span class="select-arrow">▼</span>
      </div>
      <button class="btn-primary" id="step1Btn">ถัดไป →</button>
    </div>
  </div>`;
}

// STEP 2: กรอกรหัสสมาชิก 4 หลัก
function buildStep2() {
  const grp = GROUP_LIST.find(g => g.code === state.loginGroup);
  return `<div class="login-screen">
    ${buildLoginHeader()}
    ${buildStepIndicator(2)}
    <div class="form-card">
      <p class="form-title">ขั้นตอนที่ 2 — รหัสสมาชิก</p>
      <p class="form-subtitle">กลุ่ม: <strong>${state.loginGroup} ${grp?.name||''}</strong></p>

        <input id="memberIdInput" class="form-input" type="number"

// STEP 3: กรอกรหัสผ่าน (เลข 4 หลักท้ายบัตรประชาชน)
function buildStep3() {
  const grp = GROUP_LIST.find(g => g.code === state.loginGroup);
  return `<div class="login-screen">
    ${buildLoginHeader()}
    ${buildStepIndicator(3)}
    <div class="form-card">
      <p class="form-title">ขั้นตอนที่ 3 — รหัสผ่าน</p>

// APP
function buildApp() {
  return `
    ${buildTopbar()}
    <div class="main page">${buildActivePage()}</div>
    ${buildBottomNav()}
  `;
}

function buildTopbar() {
  const m = state.memberData || {};
  return `<div class="topbar">
    <div class="topbar-avatar"><img src="${CONFIG.MGR_PHOTO}" alt="ผู้จัดการ"></div>
    <div class="topbar-title">
      <h1>${CONFIG.COOP_SHORT}</h1>
      <p>สวัสดี, ${m.prefix||''}${m.name?.split(' ')[0]||'สมาชิก'}</p>
    </div>
    <div class="topbar-logo"><img src="${CONFIG.LOGO}" alt="โลโก้"></div>
  </div>`;
}

function buildBottomNav() {
  const pages = [
    {id:'home',icon:'🏠',label:'หน้าหลัก'},
    {id:'credit',icon:'💳',label:'สินเชื่อ'},
    {id:'docs',icon:'📋',label:'ระเบียบ'},
    {id:'news',icon:'📢',label:'ข่าวสาร'},
  ];
  return `<nav class="bottom-nav">
    ${pages.map(p=>`
      <button class="nav-item ${state.activePage===p.id?'active':''}" data-page="${p.id}">
        <span class="nav-icon">${p.icon}</span><span>${p.label}</span>
      </button>`).join('')}
  </nav>`;
}

function buildActivePage() {
  if(state.activePage==='home') return buildHome();
  if(state.activePage==='credit') return buildCredit();
  if(state.activePage==='docs') return buildDocs();
  if(state.activePage==='news') return buildNews();
  return '';
}

      ${STATIC_NEWS.map(n=>`
        <div class="news-item">
          <div class="news-thumb">${n.emoji}</div>
          <div style="flex:1"><span class="news-tag">${n.tag}</span>

// ============================================================
// LOGOUT
// ============================================================
function logout() {
  state = { screen:'login_step1', activePage:'home', loginGroup:'', loginMemberId:'', memberData:null, docs:[], news:[], error:null };
  render();
}

// ============================================================
// HANDLERS
// ============================================================
function attachHandlers() {
  // Bottom nav
  document.querySelectorAll('[data-page]').forEach(btn => {
    btn.addEventListener('click', () => { state.activePage=btn.dataset.page; render(); });
  });

  // Step 1: select group
  const step1Btn = document.getElementById('step1Btn');
  if(step1Btn) step1Btn.addEventListener('click', () => {
    const sel = document.getElementById('groupSelect').value;
    if(!sel) { state.error='กรุณาเลือกกลุ่มก่อน'; render(); return; }
    state.loginGroup = sel; state.error = null;
    state.screen = 'login_step2'; render();
  });

  // Step 2: member id
  const step2Btn = document.getElementById('step2Btn');
  if(step2Btn) step2Btn.addEventListener('click', () => {
    const val = document.getElementById('memberIdInput').value.trim();
    if(!val || val.length > 4) { state.error='กรุณากรอกรหัสสมาชิก 4 หลัก'; render(); return; }
    // Check member exists in this group
    const mid = parseInt(val);
    const m = MEMBER_DB[String(mid)];
    if(!m) { state.error='ไม่พบรหัสสมาชิกนี้ กรุณาตรวจสอบอีกครั้ง'; render(); return; }
    if(m.group_code !== state.loginGroup) { state.error='รหัสสมาชิกนี้ไม่อยู่ในกลุ่มที่เลือก'; render(); return; }
    state.loginMemberId = val; state.error = null;
    state.screen = 'login_step3'; render();
  });

  // Step 3: password
  const step3Btn = document.getElementById('step3Btn');
  if(step3Btn) step3Btn.addEventListener('click', () => {
    const pwd = document.getElementById('passwordInput').value.trim();
    if(!pwd || pwd.length !== 4) { state.error='กรุณากรอกรหัสผ่าน 4 หลัก'; render(); return; }
    const m = findMember(state.loginGroup, state.loginMemberId, pwd);
    if(!m) { state.error='รหัสผ่านไม่ถูกต้อง กรุณาลองใหม่'; render(); return; }
    state.memberData = m; state.error = null;
    state.screen = 'app'; state.activePage = 'home'; render();
  });

  // Back buttons
  const back1 = document.getElementById('backStep1Btn');
  if(back1) back1.addEventListener('click', () => { state.screen='login_step1'; state.error=null; render(); });
  const back2 = document.getElementById('backStep2Btn');
  if(back2) back2.addEventListener('click', () => { state.screen='login_step2'; state.error=null; render(); });

  // Group select: auto-clear error
  const sel = document.getElementById('groupSelect');
  if(sel) sel.addEventListener('change', () => { state.error=null; });
}

// ============================================================
// INIT
// ============================================================
async function init() {
  state.screen = 'loading'; render();
  try {
    await liff.init({ liffId: CONFIG.LIFF_ID });
  } catch(e) { console.log('LIFF:', e.message); }
  state.screen = 'login_step1'; render();
}

init();
</script>
